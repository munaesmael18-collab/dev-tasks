<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-card">
            <h1 class="brand-title">Kawaii TodoList</h1>
            
            <div class="input-area">
                <input type="text" placeholder="Add your task">
                <button class="add-btn">
                    <img src="assets/add.png" alt="add" class="add-sign">
                </button>
            </div>
            
            <p class="message">Tasks added successfully.</p>
            
            <div class="task-container">
                <div class="task">
                    <span>Go to market.</span>
                    <div class="actions">
                        <button class="edit-btn">
                           <img src="assets/pencil.png" alt="edit" class="cancel">
                        </button>
                        <button class="delete-btn">
                            <img src="assets/delete.png" alt="delete" class="delete-sign">
                        </button>
                    </div>
                </div>
                <div class="task">
                    <span>to practice code</span>
                    <div class="actions">
                        <button class="edit-btn">
                           <img src="assets/pencil.png" alt="edit" class="cancel">
                        </button>
                        <button class="delete-btn">
                            <img src="assets/delete.png" alt="delete" class="delete-sign">
                        </button>
                    </div>
                </div>
                <div class="task">
                    <span>to learn new hadith</span>
                    <div class="actions">
                        <button class="edit-btn">
                            <img src="assets/pencil.png" alt="edit" class="cancel">
                        </button>
                        <button class="delete-btn">
                            <img src="assets/delete.png" alt="delete" class="delete-sign">
                        </button>
                    </div>
                </div>
                <div class="task">
                    <span>to learn arabic</span>
                    <div class="actions">
                        <button class="edit-btn">
                            <img src="assets/pencil.png" alt="edit" class="cancel">
                        </button>
                        <button class="delete-btn">
                            <img src="assets/delete.png" alt="delete" class="delete-sign">
                        </button>
                    </div>
                </div>
            </div>

            <div class="bunny-mascot">
                <img src="assets/bunny.png" alt="kawaii bunny foreground">
            </div>
        </div>
    </div>
</body>   
</html>
